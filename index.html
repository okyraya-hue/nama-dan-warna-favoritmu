<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIONESTA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center;
  background-size:cover;
}

.overlay{
  background:rgba(0,0,0,0.9);
  min-height:100vh;
  padding:20px;
  position:relative;
}

/* TIKTOK */
.tiktok{
  position:absolute;
  top:15px;
  left:15px;
  background:black;
  padding:10px 15px;
  border-radius:12px;
  border:2px solid #00f2ea;
  box-shadow:0 0 10px #ff0050;
  font-size:12px;
}

/* LOGO */
.logo{
  width:140px;
  margin-top:30px;
  filter:drop-shadow(0 0 20px gold);
}

/* TITLE */
h1{
  font-family:'Playfair Display',serif;
}

.subtitle{
  opacity:0.8;
}

/* INPUT */
.box{
  margin:25px auto;
  padding:18px;
  border-radius:18px;
  width:90%;
  max-width:420px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid gold;
}

.label{
  margin-bottom:10px;
  color:#f5c96a;
}

input{
  width:100%;
  height:48px;
  border-radius:12px;
  border:none;
  outline:none;
  text-align:center;
  font-size:15px;
  background:rgba(255,255,255,0.1);
  color:white;
}

input::placeholder{
  text-align:center;
  color:#ccc;
}

/* WARNA */
.colors{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  margin:25px;
}

.card{
  width:85px;
  height:95px;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  transition:0.3s;
}

/* WARNA */
.merah{background:#ff0000; box-shadow:0 0 15px #ff0000;}
.biru{background:#2563eb; box-shadow:0 0 15px #2563eb;}
.hijau{background:#22c55e; box-shadow:0 0 15px #22c55e;}
.kuning{background:#facc15;color:black; box-shadow:0 0 15px #facc15;}
.hitam{background:#111; box-shadow:0 0 15px #fff;}

.ungu{background:#9333ea; box-shadow:0 0 15px #9333ea;}
.pink{background:#ec4899; box-shadow:0 0 15px #ec4899;}
.orange{background:#f97316; box-shadow:0 0 15px #f97316;}
.putih{background:#f1f5f9;color:black; box-shadow:0 0 15px #fff;}

.card:hover{
  transform:scale(1.1);
}

/* RESULT */
.result{
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:420px;
  border:1px solid gold;
  display:none;
}

/* BUTTON */
.btn{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.reset{background:#9333ea;}

/* FOOTER */
footer{
  margin-top:40px;
  border-top:1px solid gold;
  padding:20px;
}

.tiktok-icon{
  width:50px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="tiktok">Temukan kami di TikTok</div>

<img src="logo2.png" class="logo">

<h1>Tes Warna Viral ✨</h1>
<div class="subtitle">Cari tahu arti dan kombinasi warna terbaikmu</div>

<div class="box">
  <div class="label">Masukkan namamu dulu</div>
  <input type="text" placeholder="Nama kamu" id="nama">
</div>

✨ Pilih warna favoritmu ✨

<div class="colors">
  <div class="card merah" onclick="pilih('merah')">❤ MERAH</div>
  <div class="card biru" onclick="pilih('biru')">❤ BIRU</div>
  <div class="card hijau" onclick="pilih('hijau')">❤ HIJAU</div>
  <div class="card kuning" onclick="pilih('kuning')">❤ KUNING</div>
  <div class="card hitam" onclick="pilih('hitam')">❤ HITAM</div>

  <div class="card ungu" onclick="pilih('ungu')">💜 UNGU</div>
  <div class="card pink" onclick="pilih('pink')">💗 PINK</div>
  <div class="card orange" onclick="pilih('orange')">🧡 ORANGE</div>
  <div class="card putih" onclick="pilih('putih')">🤍 PUTIH</div>
</div>

<div id="hasil" class="result"></div>

<button class="btn reset" onclick="reset()">Ulangi</button>

<footer>
<b>CopyRigth ©️ PIONESTA</b><br>
Ikuti kami di TikTok<br>
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="tiktok-icon"><br>
@pionesta27
</footer>

</div>

<script>
const dataWarna = {
  merah:{arti:"Berani dan penuh energi 🔥", cocok:"Putih & hitam"},
  biru:{arti:"Tenang dan setia 💙", cocok:"Putih & abu"},
  hijau:{arti:"Damai dan santai 🌿", cocok:"Coklat & krem"},
  kuning:{arti:"Ceria dan kreatif 🌟", cocok:"Hitam"},
  hitam:{arti:"Misterius dan elegan 🖤", cocok:"Emas & putih"},
  ungu:{arti:"Kreatif dan unik 💜", cocok:"Putih & silver"},
  pink:{arti:"Romantis dan penyayang 💗", cocok:"Putih & abu"},
  orange:{arti:"Semangat dan optimis 🧡", cocok:"Biru"},
  putih:{arti:"Tulus dan sederhana 🤍", cocok:"Semua warna"},
  emas:{arti:"✨ WARNA RAHASIA! Kamu sangat spesial dan beruntung 💎", cocok:"Hitam & putih"}
};

function pilih(warna){
  let nama = document.getElementById("nama").value || "Kamu";

  let random = Math.random();
  let hasil;

  if(random < 0.05){
    hasil = dataWarna["emas"];
    document.getElementById("hasil").style.boxShadow="0 0 30px gold";
  } else {
    hasil = dataWarna[warna];
    document.getElementById("hasil").style.boxShadow="none";
  }

  document.getElementById("hasil").style.display="block";
  document.getElementById("hasil").innerHTML = `
    <h3>${nama}</h3>
    <p>${hasil.arti}</p>
    <hr style="border-color:gold; margin:15px 0;">
    <p><b>🎨 Cocok dipadukan dengan:</b><br>${hasil.cocok}</p>
  `;
}

function reset(){
  document.getElementById("hasil").style.display="none";
}
</script>

</body>
</html>
