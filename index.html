<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIONESTA ARIESTA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center;
  background-size:cover;
}

.overlay{
  background:rgba(0,0,0,0.9);
  min-height:100vh;
  padding:20px;
  position:relative;
}

/* TIKTOK BADGE */
.tiktok{
  position:absolute;
  top:15px;
  left:15px;
  background:black;
  padding:10px 15px;
  border-radius:12px;
  border:2px solid #00f2ea;
  box-shadow:0 0 10px #ff0050;
  font-size:12px;
}

/* LOGO */
.logo{
  width:140px;
  margin-top:30px;
  filter:drop-shadow(0 0 20px gold);
}

/* TITLE */
h1{
  font-family:'Playfair Display',serif;
}

.subtitle{
  opacity:0.8;
}

/* BOX INPUT */
.box{
  margin:25px auto;
  padding:18px;
  border-radius:18px;
  width:90%;
  max-width:420px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);

  border:1px solid gold;
}

.label{
  margin-bottom:10px;
  color:#f5c96a;
}

/* INPUT */
input{
  width:100%;
  height:48px;
  border-radius:12px;
  border:none;
  outline:none;
  text-align:center;
  font-size:15px;
  background:rgba(255,255,255,0.1);
  color:white;
}

input::placeholder{
  text-align:center;
  color:#ccc;
}

/* WARNA */
.colors{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin:25px;
}

.card{
  width:85px;
  height:95px;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  transition:0.3s;
}

/* MERAH */
.merah{
  background:#ff0000;
  box-shadow:0 0 15px #ff0000;
}
.merah:hover{
  box-shadow:0 0 30px #ff0000, 0 0 60px #ff0000;
}

/* BIRU */
.biru{
  background:#2563eb;
  box-shadow:0 0 15px #2563eb;
}
.biru:hover{
  box-shadow:0 0 30px #2563eb, 0 0 60px #2563eb;
}

/* HIJAU */
.hijau{
  background:#22c55e;
  box-shadow:0 0 15px #22c55e;
}
.hijau:hover{
  box-shadow:0 0 30px #22c55e, 0 0 60px #22c55e;
}

/* KUNING */
.kuning{
  background:#facc15;
  color:black;
  box-shadow:0 0 15px #facc15;
}
.kuning:hover{
  box-shadow:0 0 30px #facc15, 0 0 60px #facc15;
}

/* HITAM */
.hitam{
  background:#111;
  box-shadow:0 0 15px #ffffff;
}
.hitam:hover{
  box-shadow:0 0 25px #ffffff, 0 0 50px #ffffff;
}

/* RESULT */
.result{
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:420px;
  border:1px solid gold;
  display:none;
}

/* BUTTON */
.btn{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.reset{background:#9333ea;}

/* FOOTER */
footer{
  margin-top:40px;
  border-top:1px solid gold;
  padding:20px;
}

.tiktok-icon{
  width:50px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="tiktok">
  Temukan kami di TikTok
</div>

<img src="logo.png" class="logo">

<h1>Tes Warna Lagi Viral ✨</h1>
<div class="subtitle">Temukan kepribadianmu sekarang</div>

<div class="box">
  <div class="label">Masukkan namamu dulu</div>
  <input type="text" placeholder="Nama kamu" id="nama">
</div>

✨ Pilih warna favoritmu ✨

<div class="colors">
  <div class="card merah" onclick="pilih('merah')">❤ MERAH</div>
  <div class="card biru" onclick="pilih('biru')">❤ BIRU</div>
  <div class="card hijau" onclick="pilih('hijau')">❤ HIJAU</div>
  <div class="card kuning" onclick="pilih('kuning')">❤ KUNING</div>
  <div class="card hitam" onclick="pilih('hitam')">❤ HITAM</div>
</div>

<div id="hasil" class="result"></div>

<button class="btn reset" onclick="reset()">Ulangi</button>

<footer>
<b>PIONESTA ARIESTA</b><br>

Ikuti kami di TikTok<br>
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="tiktok-icon"><br>
@pionesta.ariesta
</footer>

</div>

<script>
const arti = {
  merah:"Kamu berani dan penuh energi 🔥",
  biru:"Kamu tenang dan bisa dipercaya 💙",
  hijau:"Kamu damai dan santai 🌿",
  kuning:"Kamu ceria dan kreatif 🌟",
  hitam:"Kamu misterius dan elegan 🖤"
};

function pilih(warna){
  let nama = document.getElementById("nama").value || "Kamu";

  document.getElementById("hasil").style.display="block";
  document.getElementById("hasil").innerHTML = `
    <h3>${nama}</h3>
    <p>${arti[warna]}</p>
  `;
}

function reset(){
  document.getElementById("hasil").style.display="none";
}
</script>

</body>
</html>
